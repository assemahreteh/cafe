<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم كافيه الساعة | المنيو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #1a120b;
    --bg-panel: #241a11;
    --bg-card: #2f2115;
    --gold: #c9a44c;
    --gold-bright: #e8c973;
    --gold-dim: #8a6f38;
    --cream: #f3e9d8;
    --cream-dim: #cbbca3;
    --line: rgba(201,164,76,0.25);
    --shadow: rgba(0,0,0,0.45);
    --font-display: 'Aref Ruqaa', serif;
    --font-body: 'Tajawal', sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html,body{
    height:100%;
    background: var(--bg-deep);
    color: var(--cream);
    font-family: var(--font-body);
    overflow-x:hidden;
  }

  body{
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201,164,76,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,164,76,0.05), transparent 45%),
      linear-gradient(180deg, #1a120b 0%, #150e08 100%);
    min-height:100vh;
    position:relative;
  }

  /* ===== SPLASH SCREEN ===== */
  #splash{
    position:fixed;
    inset:0;
    z-index:100;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 50% 40%, rgba(201,164,76,0.10), transparent 55%),
      var(--bg-deep);
    transition: opacity 1s ease, visibility 1s ease;
  }

  #splash.fade-out{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .splash-frame{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    animation: riseIn 1.1s ease both;
  }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .badge-mark{
    width: min(78vw, 300px);
    filter: drop-shadow(0 6px 22px rgba(201,164,76,0.18));
  }

  .badge-mark img{
    width:100%;
    height:auto;
    display:block;
  }

  .brand-tagline{
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  .splash-rule{
    width:120px;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ===== APP SHELL ===== */
  #app{
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 20px 70px;
    opacity:0;
    transition: opacity .8s ease;
  }
  #app.visible{ opacity:1; }

  header.top-bar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding: 12px 0 30px;
    text-align:center;
  }

  header.top-bar .mini-badge{
    width: min(60vw, 190px);
  }

  header.top-bar .mini-badge img{
    width:100%;
    height:auto;
    display:block;
  }

  header.top-bar p{
    color: var(--cream-dim);
    font-size: 0.85rem;
    letter-spacing: 2px;
  }

  /* ===== SCREENS ===== */
  .screen{
    display:none;
  }
  .screen.active{
    display:block;
    animation: screenIn .5s ease both;
  }

  @keyframes screenIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* main category cards */
  .category-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 26px;
    margin-top: 10px;
  }

  @media (max-width:640px){
    .category-grid{ grid-template-columns: 1fr; }
  }

  .category-card{
    position:relative;
    border: 1px solid var(--line);
    background: linear-gradient(160deg, var(--bg-panel), var(--bg-card));
    border-radius: 18px;
    padding: 46px 26px;
    text-align:center;
    cursor:pointer;
    overflow:hidden;
    transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
  }

  .category-card::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle at 50% 0%, rgba(201,164,76,0.14), transparent 60%);
    opacity:0;
    transition: opacity .35s ease;
  }

  .category-card:hover{
    transform: translateY(-8px);
    box-shadow: 0 22px 40px var(--shadow);
    border-color: var(--gold);
  }
  .category-card:hover::before{ opacity:1; }

  .category-card .icon{
    width:56px; height:56px;
    margin:0 auto 18px;
    stroke: var(--gold-bright);
    fill:none;
    transition: transform .35s ease;
  }
  .category-card:hover .icon{ transform: scale(1.08) translateY(-2px); }

  .category-card h2{
    font-family: var(--font-display);
    font-size: 1.7rem;
    color: var(--cream);
    margin-bottom:8px;
  }

  .category-card span.count{
    color: var(--gold-dim);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  /* back button */
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--gold-bright);
    font-family: var(--font-body);
    font-size: 0.9rem;
    padding: 9px 20px;
    border-radius: 999px;
    cursor:pointer;
    margin-bottom: 24px;
    transition: background .3s ease, border-color .3s ease, transform .2s ease;
  }
  .back-btn:hover{
    background: rgba(201,164,76,0.10);
    border-color: var(--gold);
    transform: translateX(-3px);
  }
  .back-btn svg{ width:16px; height:16px; stroke: var(--gold-bright); fill:none; transform: scaleX(-1); }

  .section-title{
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--gold-bright);
    margin-bottom: 22px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .section-title::after{
    content:"";
    flex:1;
    height:1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  /* item grid */
  .item-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  @media (max-width:640px){
    .item-grid{ grid-template-columns: 1fr; }
  }

  .item-card{
    border: 1px solid var(--line);
    background: var(--bg-panel);
    border-radius: 14px;
    padding: 18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    transition: border-color .3s ease, background .3s ease, transform .3s ease;
  }

  .item-card:hover{
    border-color: var(--gold);
    background: var(--bg-card);
    transform: translateY(-3px);
  }

  .item-info h3{
    font-size: 1.05rem;
    color: var(--cream);
    margin-bottom: 5px;
    font-weight: 700;
  }

  .item-info p{
    font-size: 0.82rem;
    color: var(--cream-dim);
    line-height: 1.5;
  }

  .item-price{
    flex-shrink:0;
    background: rgba(201,164,76,0.10);
    border: 1px solid var(--gold-dim);
    color: var(--gold-bright);
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 12px;
    border-radius: 999px;
    white-space:nowrap;
  }

  footer{
    text-align:center;
    color: var(--gold-dim);
    font-size: 0.75rem;
    letter-spacing:2px;
    margin-top: 50px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>

<script>
  const hotDrinks = [
    { name: "إسبريسو", desc: "جرعة قهوة مركزة بطبقة كريما ذهبية", price: "12 ر.س" },

  const coldDrinks = [
    { name: "آيس لاتيه", desc: "إسبريسو بارد مع حليب مثلج ورغوة خفيفة", price: "19 ر.س" },
    { name: "آيس أمريكانو", desc: "إسبريسو مثلج منعش بنكهة قوية", price: "15 ر.س" },
    { name: "موكا باردة", desc: "قهوة وشوكولاتة مثلجة مع كريمة", price: "21 ر.س" },
    { name: "فرابتشينو", desc: "مشروب قهوة مخفوق بقوام كريمي كثيف", price: "22 ر.س" },
    { name: "سموذي مانجو", desc: "مانجو طازج مخفوق بقوام ناعم منعش", price: "20 ر.س" },
    { name: "ميلك شيك فانيليا", desc: "حليب مخفوق بنكهة الفانيليا الغنية", price: "20 ر.س" },
    { name: "ليموناضة نعناع", desc: "ليمون طازج مع نعناع بارد منعش", price: "16 ر.س" },
    { name: "آيس شاي", desc: "شاي مثلج بنكهة الفواكه الخفيفة", price: "14 ر.س" },
    { name: "كولد برو", desc: "قهوة منقوعة ببرودة لساعات لنكهة ناعمة", price: "18 ر.س" },
    { name: "فرابيه كراميل", desc: "قهوة مثلجة مخفوقة بصوص الكراميل", price: "22 ر.س" }
  ];

  function buildGrid(containerId, items){
    const container = document.getElementById(containerId);
    container.innerHTML = items.map(item => `
      <div class="item-card">
        <div class="item-info">
          <h3>${item.name}</h3>
          <p>${item.desc}</p>
        </div>
        <div class="item-price">${item.price}</div>
      </div>
    `).join('');
  }

  buildGrid('hot-grid', hotDrinks);
  buildGrid('cold-grid', coldDrinks);

  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('app').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      const splash = document.getElementById('splash');
      const app = document.getElementById('app');
      splash.classList.add('fade-out');
      app.classList.add('visible');
      setTimeout(() => { splash.style.display = 'none'; }, 1000);
    }, 2000);
  });
</script>
